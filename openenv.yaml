name: cyber-triage-env
version: "1.0.0"
description: >
  A reinforcement learning environment simulating a Security Operations Center
  (SOC) analyst triaging cyber security alerts. The agent must classify alerts
  as true/false positives, assess severity, and recommend response actions.
  Tasks range from obvious single-alert triage to subtle APT (Advanced
  Persistent Threat) campaign detection across correlated low-signal events.

author: "Hackathon Team"
tags:
  - openenv
  - cybersecurity
  - threat-intelligence
  - soc
  - rl-environment
  - real-world

environment:
  type: text
  action_space: discrete+structured
  observation_space: structured-json
  reward_range: [-1.0, 1.0]
  episode_reward_range: [0.0, 1.0]

tasks:
  - id: easy
    name: "Single Alert Triage"
    description: >
      Triage a single security alert with clear indicators of compromise.
      The alert contains obvious signals such as known bad IPs, clear attack
      patterns, or direct threat intelligence matches.
    difficulty: easy
    max_steps: 5
    reward_threshold: 0.6

  - id: medium
    name: "Correlated Multi-Alert Campaign"
    description: >
      Triage multiple related alerts that together form an attack campaign.
      The agent must correlate events (e.g., brute force → successful login →
      data exfiltration) and respond appropriately to each stage.
    difficulty: medium
    max_steps: 10
    reward_threshold: 0.6

  - id: hard
    name: "APT Low-and-Slow Detection"
    description: >
      Detect an Advanced Persistent Threat that mimics legitimate admin
      behavior over multiple days. Individual alerts are low-severity;
      the agent must recognize the kill-chain pattern across correlated events.
      Designed to challenge frontier models.
    difficulty: hard
    max_steps: 15
    reward_threshold: 0.6

api:
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state"
  health: "GET /health"

observation:
  type: CyberTriageObservation
  fields:
    - name: task_id
      type: string
    - name: step
      type: integer
    - name: alerts
      type: "List[Alert]"
    - name: threat_intel
      type: ThreatIntel
    - name: step_budget
      type: integer
    - name: previous_actions
      type: "List[str]"
    - name: instructions
      type: string
    - name: done
      type: boolean

action:
  type: CyberTriageAction
  fields:
    - name: alert_id
      type: string
      description: "ID of the alert being triaged"
    - name: classification
      type: "enum: true_positive | false_positive | uncertain"
    - name: severity
      type: "enum: low | medium | high | critical"
    - name: action
      type: "enum: dismiss | monitor | block_ip | escalate_to_ir | isolate_host | patch_advisory"
    - name: reasoning
      type: "string (optional)"

reward:
  type: CyberTriageReward
  components:
    - classification_score: 0.35
    - severity_score: 0.25
    - action_score: 0.30
    - efficiency_bonus: 0.10
  notes: >
    Asymmetric penalties: missing a true positive (false negative) incurs
    a heavier penalty than a false alarm (false positive), reflecting the
    real-world cost asymmetry in security operations.
